<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мій навчальний сайт</title>
  <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <nav>
      <ul class="nav-list">
        <li><a href="./index.html">Головна</a></li>
        <li><a href="./pages/about.html">Про мене</a></li>
        <li><a href="./pages/contact.html">Контакти</a></li>
        <li><a href="./pages/favorites.html">Обране</a></li>
      </ul>
      <button class="theme-toggle">🌙 Тема</button>
    </nav>
  </div>
</header>

<main class="container">
  <h1>Мій перший HTML-сайт</h1>

  <section class="card">
    <h2>Навчальний каталог</h2>
    
    <div class="controls" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
      <input type="text" id="search" placeholder="Пошук..." style="flex: 1; min-width: 200px;">
      <select id="categoryFilter"><option value="all">Усі категорії</option><option value="frontend">Frontend</option><option value="backend">Backend</option><option value="design">Design</option></select>
      <select id="sortOrder">
        <option value="default">Сортувати за...</option>
        <option value="rating">За рейтингом</option>
        <option value="title">За назвою</option>
      </select>
    </div>

    <div id="loader">Завантаження...</div>
    <div id="error-message" class="hidden" style="color: red;">Помилка!</div>
    <div id="empty-message" class="hidden">Нічого не знайдено.</div>

    <div id="catalog" class="catalog-grid"></div>
    <button id="loadMoreBtn" style="margin-top: 20px;">Показати ще</button>
  </section>
</main>

<div id="modal" class="hidden">
  <div class="modal-content">
    <span id="closeModal" style="cursor:pointer; float:right; font-size:24px;">&times;</span>
    <div id="modal-body"></div>
  </div>
</div>

<script src="./js/main.js" defer></script>
</body>
</html>
